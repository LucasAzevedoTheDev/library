<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="styles.css">
  <script src="scripts.js" defer></script>  
</head>
<body>
  <button class="new-button" type="button">New book</button>
  <dialog class="modal">
    <form action="" method="dialog" class="form">
      <div class="form-field">
        <label for="name-input">Book's name:</label>
        <input type="text" id="name-input">
        <label for="author-input">Book's author:</label>
        <input type="text" id="author-input">
        <label for="pages-input">Number of pages:</label>
        <input type="number" id="pages-input">
      </div>
      <div class="buttons-field">
        <button class="submit" type="submit">Add new book</button>
        <button class="close-button" type="button">Cancel</button>
      </div>
    </form>
  </dialog>
  <div class="container"></div>
</body>
</html>
